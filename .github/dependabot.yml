version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    commit-message:
      prefix: deps
    groups:
      # Batch low-risk updates into one PR to cut review noise.
      minor-and-patch:
        update-types: [minor, patch]
    ignore:
      - dependency-name: '*'
        update-types: [version-update:semver-major]

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    commit-message:
      prefix: deps
    groups:
      minor-and-patch:
        update-types: [minor, patch]
    ignore:
      - dependency-name: '*'
        update-types: [version-update:semver-major]

  - package-ecosystem: docker
    directory: /
    schedule:
      interval: monthly
    commit-message:
      prefix: deps
    ignore:
      - dependency-name: '*'
        update-types: [version-update:semver-major]
